site_name: "Pattrn Documentation"
site_description: "Documentation for Pattrn, a segmented-pattern matching library for .NET."
site_url: "https://simongelbart.github.io/pattrn/"

repo_url: "https://github.com/SimonGelbart/pattrn"
repo_name: "SimonGelbart/pattrn"
edit_uri: "edit/main/docs/"

docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.path
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - "← Main site": "https://simongelbart.github.io/"
  - Home: README.md
  - ADRs: adr/README.md
  - Reference:
      - Documentation site: reference/documentation-site.md

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - toc:
      permalink: true
