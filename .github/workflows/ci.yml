name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET build and test
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Pattrn.sln

      - name: Build
        run: dotnet build Pattrn.sln --configuration Release --no-restore

      - name: Test TUnit projects
        run: >-
          dotnet test
          --test-modules "tests/**/bin/Release/net10.0/*.Tests.dll"
          --root-directory .
          --results-directory TestResults
          --
          --report-trx

      - name: Upload .NET test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: |
            TestResults/*.trx
            TestResults/**/*.trx
          if-no-files-found: ignore
