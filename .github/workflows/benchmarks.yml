name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'BenchmarkDotNet filter, for example * or *Routing*'
        required: false
        default: '*'
      strategy:
        description: 'BenchmarkDotNet run strategy'
        required: false
        default: 'Throughput'
        type: choice
        options:
          - Throughput
          - ColdStart
          - Monitoring
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  deployments: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.filter || 'tag' }}
  cancel-in-progress: false

jobs:
  benchmarks:
    name: Run BenchmarkDotNet benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: 'true'
      BENCHMARK_FILTER: ${{ github.event.inputs.filter || '*' }}
      BENCHMARK_STRATEGY: ${{ github.event.inputs.strategy || 'Throughput' }}
      BENCHMARK_ARTIFACTS: ${{ github.workspace }}/BenchmarkDotNet.Artifacts
      BENCHMARK_ACTION_REPORT: BenchmarkDotNet.Artifacts/results/benchmark-action-report-full-compressed.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore benchmark project
        run: dotnet restore benchmarks/Pattrn.Benchmarks/Pattrn.Benchmarks.csproj

      - name: Run benchmarks
        run: >-
          dotnet run
          --project benchmarks/Pattrn.Benchmarks/Pattrn.Benchmarks.csproj
          --configuration Release
          --no-restore
          --
          --filter "$BENCHMARK_FILTER"
          --join
          --exporters json
          --strategy "$BENCHMARK_STRATEGY"
          --artifacts "$BENCHMARK_ARTIFACTS"

      - name: Prepare benchmark comparison input
        run: |
          set -euo pipefail
          report="$(find "$BENCHMARK_ARTIFACTS/results" -maxdepth 1 -name '*-report-full-compressed.json' -print -quit)"
          if [ -z "$report" ]; then
            echo "No BenchmarkDotNet full compressed JSON report found under $BENCHMARK_ARTIFACTS/results" >&2
            find "$BENCHMARK_ARTIFACTS" -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi
          mkdir -p "$(dirname "$BENCHMARK_ACTION_REPORT")"
          cp "$report" "$BENCHMARK_ACTION_REPORT"
          echo "Using benchmark report: $report"

      - name: Publish and compare benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Pattrn Benchmarks
          tool: benchmarkdotnet
          output-file-path: ${{ env.BENCHMARK_ACTION_REPORT }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '110%'
          fail-on-alert: true
          comment-on-alert: true
          summary-always: true

      - name: List benchmark artifacts
        if: always()
        run: |
          find "$BENCHMARK_ARTIFACTS" -maxdepth 4 -type f -print || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ${{ env.BENCHMARK_ARTIFACTS }}/**
          if-no-files-found: error
