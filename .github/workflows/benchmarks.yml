name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'BenchmarkDotNet filter, for example * or *Routing*'
        required: false
        default: '*'
      strategy:
        description: 'BenchmarkDotNet run strategy'
        required: false
        default: 'Throughput'
        type: choice
        options:
          - Throughput
          - ColdStart
          - Monitoring
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.filter || 'tag' }}
  cancel-in-progress: false

jobs:
  benchmarks:
    name: Run BenchmarkDotNet benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: 'true'
      BENCHMARK_FILTER: ${{ github.event.inputs.filter || '*' }}
      BENCHMARK_STRATEGY: ${{ github.event.inputs.strategy || 'Throughput' }}
      BENCHMARK_ARTIFACTS: ${{ github.workspace }}/BenchmarkDotNet.Artifacts
      BENCHMARK_CI_RESULTS: ${{ github.workspace }}/benchmark-ci-results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore benchmark project
        run: dotnet restore benchmarks/Pattrn.Benchmarks/Pattrn.Benchmarks.csproj

      - name: Run benchmarks
        run: >-
          dotnet run
          --project benchmarks/Pattrn.Benchmarks/Pattrn.Benchmarks.csproj
          --configuration Release
          --no-restore
          --
          --filter "$BENCHMARK_FILTER"
          --join
          --exporters json
          --exporters markdown
          --strategy "$BENCHMARK_STRATEGY"
          --artifacts "$BENCHMARK_ARTIFACTS"

      - name: Verify BenchmarkDotNet JSON report
        run: |
          set -euo pipefail
          report="$(find "$BENCHMARK_ARTIFACTS/results" -maxdepth 1 -name '*-report-full-compressed.json' -print -quit)"
          if [ -z "$report" ]; then
            echo "No BenchmarkDotNet full compressed JSON report found under $BENCHMARK_ARTIFACTS/results" >&2
            find "$BENCHMARK_ARTIFACTS" -maxdepth 4 -type f -print >&2 || true
            exit 1
          fi
          echo "Using benchmark report: $report"

      - name: Prepare CI benchmark artifacts and summary
        if: always()
        run: |
          set -euo pipefail
          mkdir -p "$BENCHMARK_CI_RESULTS/raw" "$BENCHMARK_CI_RESULTS/summaries"

          if [ -d "$BENCHMARK_ARTIFACTS" ]; then
            cp -R "$BENCHMARK_ARTIFACTS"/. "$BENCHMARK_CI_RESULTS/raw/"
          fi

          cat > "$BENCHMARK_CI_RESULTS/metadata.json" <<JSON
          {
            "repository": "${GITHUB_REPOSITORY}",
            "ref": "${GITHUB_REF}",
            "sha": "${GITHUB_SHA}",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "benchmark_filter": "${BENCHMARK_FILTER}",
            "benchmark_strategy": "${BENCHMARK_STRATEGY}"
          }
          JSON

          cat > "$BENCHMARK_CI_RESULTS/summaries/grouped-summary.md" <<'MD'
          # Benchmark Summary

          Benchmark artifacts from this workflow run are the benchmark source of truth for this commit.

          ## Groups

          | Group | Existing benchmark classes | Purpose |
          |---|---|---|
          | Core matching | `PattrnIndexBenchmarks` | Generic segmented matching, detailed matches, captures, duplicates, and naive baseline comparison. |
          | Routing preview | `RoutingBenchmarks` | Route-template parsing, path splitting, route helper matching, and route detailed matching. |
          | Builder and diagnostics | `BuilderBenchmarks` | Build-time behavior, large pattern sets, diagnostics, and validation overhead. |
          | String helpers | Existing string-helper coverage in core/package tests; add focused benchmarks later only if needed. | Separated string ergonomics and normalization scenarios. |

          ## Downloadable artifacts

          Download the `benchmark-results` artifact from this workflow run for raw BenchmarkDotNet output, metadata, and summaries.
          MD

          {
            echo "# Benchmark Summary"
            echo
            echo "Benchmark artifacts from this workflow run are the benchmark source of truth for this commit."
            echo
            echo "## Run metadata"
            echo
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Ref: ${GITHUB_REF}"
            echo "- SHA: ${GITHUB_SHA}"
            echo "- Run ID: ${GITHUB_RUN_ID}"
            echo "- Filter: ${BENCHMARK_FILTER}"
            echo "- Strategy: ${BENCHMARK_STRATEGY}"
            echo
            cat "$BENCHMARK_CI_RESULTS/summaries/grouped-summary.md"
            echo
            echo "## Artifact contents"
            echo
            find "$BENCHMARK_CI_RESULTS" -maxdepth 4 -type f -print | sort | sed 's#^#- #'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: List benchmark artifacts
        if: always()
        run: |
          find "$BENCHMARK_CI_RESULTS" -maxdepth 5 -type f -print || true

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.BENCHMARK_CI_RESULTS }}/**
          if-no-files-found: error
